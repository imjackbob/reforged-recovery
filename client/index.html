<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO. Per-page <Seo> overrides title/description at runtime. -->
    <title>Reforged Recovery Inc. — What was once broken can be Reforged</title>
    <meta
      name="description"
      content="Reforged Recovery Inc. is a nonprofit helping individuals rebuild their lives through recovery support, life skills, family restoration, faith, and community. Your past does not define you."
    />
    <meta name="theme-color" content="#14171c" />
    <link rel="canonical" href="https://www.reforgedrecovery.org/" />

    <!-- Open Graph / social sharing defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Reforged Recovery Inc." />
    <meta
      property="og:title"
      content="Reforged Recovery Inc. — What was once broken can be Reforged"
    />
    <meta
      property="og:description"
      content="A nonprofit addiction recovery organization helping people rebuild their lives, stronger."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:url" content="https://www.reforgedrecovery.org/" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: Oswald (display) + Inter (body). Preconnect for perf. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      ANALYTICS: paste the client's Google Analytics (GA4) or Plausible snippet
      here before launch. See README > Integrations. Left out of source so no
      tracking runs in dev. Example (GA4):
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXX"></script>
      <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}
      gtag('js',new Date());gtag('config','G-XXXX');</script>
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
